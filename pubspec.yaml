name: soriana_character_explorer
description: Explorador técnico de personajes de Rick and Morty.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ^3.9.2
dependencies:
  flutter: {sdk: flutter}
  flutter_web_plugins: {sdk: flutter}
  flutter_bloc: ^9.1.1
  chopper: ^8.3.0
  http: ^1.6.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  shared_preferences: ^2.5.3
  auto_route: ^11.1.0
  phosphor_icons: ^3.0.1
dev_dependencies:
  flutter_test: {sdk: flutter}
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  chopper_generator: ^8.3.0
  injectable_generator: ">=3.0.2 <3.1.0"
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  # 10.6.0 requires lean_builder ^1.2, incompatible with injectable_generator
  # 3.0.2 on the repository's Dart 3.11 toolchain.
  auto_route_generator: ^10.5.0
flutter:
  uses-material-design: true
